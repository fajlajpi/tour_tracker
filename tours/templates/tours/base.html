<!DOCTYPE html>
<html>
<head>
    <title>Tour Guide Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .profit-positive { color: #198754; font-weight: 600; }
        .profit-negative { color: #dc3545; font-weight: 600; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'tour-list' %}">Tour Tracker</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'tour-list' %}">Tours</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'current-stats' %}">Monthly Stats</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'yearly-stats' %}">Yearly Stats</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'exchange-rates' %}">Rates</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'tour-create' %}">Add Tour</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/">Admin</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Initialise Bootstrap tooltips globally
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(function (el) {
                new bootstrap.Tooltip(el, { trigger: 'hover focus' });
            });
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
